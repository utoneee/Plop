function centroidOf(pts){
  let x=0,y=0;
  for(const p of pts){ x+=p[0]; y+=p[1]; }
  return [x/pts.length, y/pts.length];
}
function centerPts(pts){
  const c=centroidOf(pts);
  return pts.map(p=>[p[0]-c[0], p[1]-c[1]]);
}
function rightTri(l){ return centerPts([[0,0],[l,0],[0,l]]); }
function rect(w,h){ return [[-w/2,-h/2],[w/2,-h/2],[w/2,h/2],[-w/2,h/2]]; }
function semicircle(r,seg){
  const pts=[];
  for(let i=0;i<=seg;i++){
    const t=Math.PI - (i/seg)*Math.PI;
    pts.push([r*Math.cos(t), -r*Math.sin(t)]);
  }
  const cy = -4*r/(3*Math.PI);
  return pts.map(p=>[p[0], p[1]-cy]);
}
function blob(rx,ry,n,a1,p1,a2,p2){
  const pts=[];
  for(let i=0;i<n;i++){
    const t=i/n*2*Math.PI;
    const w=1 + a1*Math.sin(2*t+p1) + a2*Math.sin(3*t+p2);
    pts.push([Math.cos(t)*rx*w, Math.sin(t)*ry*w]);
  }
  return centerPts(pts);
}
function allEdges(pts){
  const e=[];
  for(let i=0;i<pts.length;i++) e.push([i,(i+1)%pts.length]);
  return e;
}
function archPts(){
  const pts=[[-58.5,-58.5],[58.5,-58.5],[58.5,58.5],[34,58.5],[34,24.5]];
  for(let i=1;i<8;i++){
    const t=-i/8*Math.PI;
    pts.push([34*Math.cos(t), 24.5+34*Math.sin(t)]);
  }
  pts.push([-34,24.5],[-34,58.5],[-58.5,58.5]);
  return pts;
}
const SEMI_R  = 58.5;
const SEMI_CY = 4*SEMI_R/(3*Math.PI);
function doorPts(){
  const pts=[];
  for(let i=0;i<=8;i++){
    const t=-Math.PI + i/8*Math.PI;
    pts.push([34*Math.cos(t), 34*Math.sin(t)]);
  }
  pts.push([34,34],[-34,34]);
  return pts;
}
const BRIDGE_R1 = 58.5, BRIDGE_R2 = 36;
const BRIDGE_CY = 4*(BRIDGE_R1**3-BRIDGE_R2**3)/(3*Math.PI*(BRIDGE_R1**2-BRIDGE_R2**2));
function bridgePts(){
  const pts=[];
  for(let i=0;i<=8;i++){
    const t=Math.PI - i/8*Math.PI;
    pts.push([BRIDGE_R1*Math.cos(t), BRIDGE_CY-BRIDGE_R1*Math.sin(t)]);
  }
  for(let i=0;i<=8;i++){
    const t=i/8*Math.PI;
    pts.push([BRIDGE_R2*Math.cos(t), BRIDGE_CY-BRIDGE_R2*Math.sin(t)]);
  }
  return pts;
}
const BRIDGE=bridgePts();

const SHAPES = {

             } },
  circle:  { pts:blob(34,34,24,0,0,0,0),       edges:[], organic:true, label:'圓',
             arcPlug:{x:0,y:0,r:34},
             trace:c=>{ c.arc(0,0,34,0,Math.PI*2); c.closePath(); } },
  circleBig:{ pts:blob(SEMI_R,SEMI_R,28,0,0,0,0), edges:[], organic:true, label:'大圓',
             trace:c=>{ c.arc(0,0,SEMI_R,0,Math.PI*2); c.closePath(); } },
  pebble:  { pts:blob(56,45,22,0.05,0.7,0.03,2.1), edges:[], organic:true, label:'鵝卵石' },

for(const k in SHAPES){
  const s=SHAPES[k];

  s.bbox=[x0,y0,x1,y1];
}
const TRAY_ORDER=['triBig','triSmall','isoTri','square','squareS','rectBig','para','trap','stair','arch','door','bridge','semi','circle','circleBig','pebble','bean'];

let W=0,H=0,DPR=1, trayTop=0;

let gidSeq=1, idSeq=1, colorSeq=0;

let skinKey='mineral', bgKey='paper';

function xformPts(pts,p){
  if(!p.rot) return pts.map(q=>[q[0]+p.x, q[1]+p.y]);
  const c=Math.cos(p.rot), s=Math.sin(p.rot);
  return pts.map(q=>[q[0]*c-q[1]*s+p.x, q[0]*s+q[1]*c+p.y]);
}
function worldPts(p){ return xformPts(SHAPES[p.shape].pts,p); }
function worldParts(p){ return SHAPES[p.shape].parts.map(part=>xformPts(part,p)); }

function worldPopPts(p) {
  const base = worldPts(p);
  return base.map((q, idx) => {
    const seed = Math.sin(idx * 2.3 + p.x * 0.04 + p.y * 0.05) * 1000;
    const randX = (seed - Math.floor(seed)) * 4.0 - 2.0; 
    const randY = ((seed * 1.5) - Math.floor(seed * 1.5)) * 4.0 - 2.0;
    return [q[0] + randX, q[1] + randY];
  });
}

function worldBBox(p){
  const pts=worldPts(p);
  let x0=1e9,y0=1e9,x1=-1e9,y1=-1e9;
  for(const q of pts){
    if(q[0]<x0)x0=q[0]; if(q[0]>x1)x1=q[0];
    if(q[1]<y0)y0=q[1]; if(q[1]>y1)y1=q[1];
  }
  return [x0,y0,x1,y1];
}
function bboxOverlap(a,b,pad){
  return a[0]-pad<b[2] && a[2]+pad>b[0] && a[1]-pad<b[3] && a[3]+pad>b[1];
}
function axesOf(pts){
  const ax=[];
  for(let i=0;i<pts.length;i++){
    const j=(i+1)%pts.length;
    const dx=pts[j][0]-pts[i][0], dy=pts[j][1]-pts[i][1];
    const l=Math.hypot(dx,dy);
    if(l<1e-6) continue;
    ax.push([-dy/l, dx/l]);
  }
  return ax;
}
function projRange(pts,ax){
  let mn=1e18,mx=-1e18;
  for(const p of pts){
    const d=p[0]*ax[0]+p[1]*ax[1];
    if(d<mn)mn=d; if(d>mx)mx=d;
  }
  return [mn,mx];
}
function mtv(A,B){
  let best=1e18, bax=null;
  const axes=axesOf(A).concat(axesOf(B));
  for(const ax of axes){
    const [a1,a2]=projRange(A,ax), [b1,b2]=projRange(B,ax);
    const ov=Math.min(a2,b2)-Math.max(a1,b1);
    if(ov<=0) return null;
    if(ov<best){ best=ov; bax=ax; }
  }
  if(best<PUSH_MIN) return null;
  const ca=centroidOf(A), cb=centroidOf(B);
  const s=((cb[0]-ca[0])*bax[0]+(cb[1]-ca[1])*bax[1])>=0 ? 1 : -1;
  return [bax[0]*best*s, bax[1]*best*s];
}
function gapInfo(A,B){
  let g=-1e18, gax=null;
  const ca=centroidOf(A), cb=centroidOf(B);
  const axes=axesOf(A).concat(axesOf(B));
  for(const ax of axes){
    const [a1,a2]=projRange(A,ax), [b1,b2]=projRange(B,ax);
    const gap=Math.max(a1,b1)-Math.min(a2,b2);
    if(gap>g){
      g=gap;
      const s=((cb[0]-ca[0])*ax[0]+(cb[1]-ca[1])*ax[1])>=0 ? 1 : -1;
      gax=[ax[0]*s, ax[1]*s];
    }
  }
  return {gap:g, axis:gax};
}
function pointInPoly(x,y,pts){
  let inside=false;
  for(let i=0,j=pts.length-1;i<pts.length;j=i++){
    const xi=pts[i][0],yi=pts[i][1],xj=pts[j][0],yj=pts[j][1];
    if(((yi>y)!==(yj>y)) && (x < (xj-xi)*(y-yi)/(yj-yi)+xi)) inside=true;
  }
  return inside;
}

function groupPieces(gid){ return pieces.filter(p=>p.gid===gid); }
function groupBBox(list){
  let x0=1e9,y0=1e9,x1=-1e9,y1=-1e9;
  for(const p of list){
    const b=worldBBox(p);
    x0=Math.min(x0,b[0]); y0=Math.min(y0,b[1]);
    x1=Math.max(x1,b[2]); y1=Math.max(y1,b[3]);
  }
  return [x0,y0,x1,y1];
}
function moveGroup(list,dx,dy){
  for(const p of list){ p.x+=dx; p.y+=dy; }
}
function clampGroup(list){
  const b=groupBBox(list);
  let dx=0,dy=0;
  if(b[0]<MARGIN) dx=MARGIN-b[0];
  else if(b[2]>W-MARGIN) dx=(W-MARGIN)-b[2];
  if(b[1]<MARGIN) dy=MARGIN-b[1];
  else if(b[3]>trayTop-MARGIN) dy=(trayTop-MARGIN)-b[3];
  if(dx||dy) moveGroup(list,dx,dy);
  return [dx,dy];
}
function unionGroups(g1,g2){
  if(g1===g2) return;
  for(const p of pieces) if(p.gid===g2) p.gid=g1;
}
function edgeMated(p,q){
  const sp=SHAPES[p.shape], sq=SHAPES[q.shape];
  if(!sp.edges.length || !sq.edges.length) return false;
  const wp=worldPts(p), wq=worldPts(q);
  for(const [i,j] of sp.edges){
    const a=wp[i], b=wp[j];
    let dx=b[0]-a[0], dy=b[1]-a[1];
    const l1=Math.hypot(dx,dy); dx/=l1; dy/=l1;
    for(const [k,l] of sq.edges){
      const c=wq[k], e=wq[l];
      let ex=e[0]-c[0], ey=e[1]-c[1];
      const l2=Math.hypot(ex,ey); ex/=l2; ey/=l2;
      if(dx*ex+dy*ey > -0.99) continue;
      const nx=-ey, ny=ex;
      const d1=(a[0]-c[0])*nx+(a[1]-c[1])*ny; 
      const d2=(b[0]-c[0])*nx+(b[1]-c[1])*ny;
      if(Math.abs(d1)>MATE_EPS || Math.abs(d2)>MATE_EPS) continue;
      const ta=(a[0]-c[0])*ex+(a[1]-c[1])*ey;
      const tb=(b[0]-c[0])*ex+(b[1]-c[1])*ey;
      const lo=Math.min(ta,tb), hi=Math.max(ta,tb);
      if(Math.min(hi,l2)-Math.max(lo,0) >= 6) return true;
    }
  }
  return false;
}
function pieceGap(p,q){
  let best={gap:1e18, axis:null};
  for(const A of worldParts(p)){
    for(const B of worldParts(q)){
      const g=gapInfo(A,B);
      if(g.gap<best.gap) best=g;
    }
  }
  return best;
}
function inContact(p,q,eps){
  if(!bboxOverlap(worldBBox(p),worldBBox(q),eps+1)) return false;
  return pieceGap(p,q).gap <= eps;
}
function adjacent(p,q){
  const org=SHAPES[p.shape].organic || SHAPES[q.shape].organic;
  if(edgeMated(p,q)) return true;
  if(org && inContact(p,q,CONTACT_EPS)) return true;
  return false;
}
function splitGroup(gid){
  const list=groupPieces(gid);
  if(list.length<=1) return;
  const seen=new Set();
  for(const seed of list){
    if(seen.has(seed.id)) continue;
    const ng=gidSeq++;
    const stack=[seed];
    seen.add(seed.id);
    while(stack.length){
      const cur=stack.pop();
      cur.gid=ng;
      for(const o of list){
        if(seen.has(o.id)) continue;
        if(adjacent(cur,o)){ seen.add(o.id); stack.push(o); }
      }
    }
  }
}

function findEdgeSnap(dragList,minScore){
  minScore=minScore||0;
  const dragSet=new Set(dragList.map(p=>p.id));
  let best=null;
  for(const dp of dragList){
    const sp=SHAPES[dp.shape];
    if(!sp.edges.length) continue;
    const wp=worldPts(dp);
    const db=worldBBox(dp);
    for(const op of pieces){
      if(dragSet.has(op.id)) continue;
      const sq=SHAPES[op.shape];
      if(!sq.edges.length) continue;
      if(!bboxOverlap(db,worldBBox(op),SNAP_PERP+SNAP_END)) continue;
      const wq=worldPts(op);
      for(const [i,j] of sp.edges){
        const a=wp[i], b=wp[j];
        let dx=b[0]-a[0], dy=b[1]-a[1];
        const l1=Math.hypot(dx,dy); dx/=l1; dy/=l1;
        for(const [k,l] of sq.edges){
          const c=wq[k], e=wq[l];
          let ex=e[0]-c[0], ey=e[1]-c[1];
          const l2=Math.hypot(ex,ey); ex/=l2; ey/=l2;
          if(dx*ex+dy*ey > -0.985) continue;
          const nx=-ey, ny=ex;
          const mx=(a[0]+b[0])/2, my=(a[1]+b[1])/2;
          const dPerp=(mx-c[0])*nx+(my-c[1])*ny;
          if(Math.abs(dPerp)>SNAP_PERP) continue;
          let tx=-nx*dPerp, ty=-ny*dPerp;
          const ta=(a[0]+tx-c[0])*ex+(a[1]+ty-c[1])*ey;
          const tb=(b[0]+tx-c[0])*ex+(b[1]+ty-c[1])*ey;
          const lo=Math.min(ta,tb), hi=Math.max(ta,tb);
          const ov=Math.min(hi,l2)-Math.max(lo,0);
          if(ov<SNAP_OVERLAP) continue;
          let shift=0;
          const s1=-lo, s2=l2-hi;
          if(Math.abs(s1)<=SNAP_END && Math.abs(s1)<=Math.abs(s2)) shift=s1;
          else if(Math.abs(s2)<=SNAP_END) shift=s2;
          tx+=ex*shift; ty+=ey*shift;
          const score=Math.hypot(tx,ty);
          if(score>SNAP_PERP+SNAP_END) continue;
          if(score<minScore) continue;
          if(!best || score<best.score) best={dx:tx,dy:ty,score,tx:ex,ty:ey};
        }
      }
    }
  }
  return best;
}

function resolveCollisions(dragGid){
  const now=performance.now();
  for(let iter=0;iter<4;iter++){
    let moved=false;
    const gids=[...new Set(pieces.map(p=>p.gid))];
    for(let a=0;a<gids.length;a++){
      for(let b=a+1;b<gids.length;b++){
        const g1=gids[a], g2=gids[b];
        const l1=groupPieces(g1), l2=groupPieces(g2);
        if(!bboxOverlap(groupBBox(l1),groupBBox(l2),2)) continue;
        for(const p of l1){
          const pb=worldBBox(p);
          for(const q of l2){
            if(!bboxOverlap(pb,worldBBox(q),1)) continue;
            for(const pa of worldParts(p)){
              let hit=false;
              for(const qb of worldParts(q)){
                const m=mtv(pa,qb);
                if(!m) continue;
                moved=true; hit=true;
                if(g1===dragGid){
                  moveGroup(l2,m[0],m[1]); pushedAt.set(g2,now);
                }else if(g2===dragGid){
                  moveGroup(l1,-m[0],-m[1]); pushedAt.set(g1,now);
                }else{
                  moveGroup(l1,-m[0]/2,-m[1]/2);
                  moveGroup(l2, m[0]/2, m[1]/2);
                  pushedAt.set(g1,now); pushedAt.set(g2,now);
                }
              }
              if(hit) break;
            }
          }
        }
        if(g1!==dragGid) clampGroup(l1);
        if(g2!==dragGid) clampGroup(l2);
      }
    }
    if(!moved) break;
  }
}

let trayScroll=0, trayScrollMin=0;
function layoutWells(){
  wells=[];
  if(!trayVisible()){ trayScroll=0; trayScrollMin=0; return; }
  const n=TRAY_ORDER.length;
  const gap=4;
  const avail=W-20;
  const w=Math.max(64, Math.min(96,(avail-gap*(n-1))/n));
  const total=w*n+gap*(n-1);
  trayScrollMin=Math.min(0, avail-total);
  trayScroll=Math.max(trayScrollMin, Math.min(0, trayScroll));
  let x = total<=avail ? (W-total)/2 : 10;
  for(const key of TRAY_ORDER){
    wells.push({shape:key, x, y:trayTop+10, w, h:TRAY_H-24});
    x+=w+gap;
  }
}
function trayScrollable(){ return trayScrollMin<0; }

let undoStack=[];
function pushUndo(){
  undoStack.push(pieces.map(p=>({shape:p.shape,ci:p.ci,x:p.x,y:p.y,rot:p.rot||0,gid:p.gid})));
  if(undoStack.length>30) undoStack.shift();
}
function doUndo(){
  if(drag||press) return;
  if(!undoStack.length){ showToast('沒有可復原的'); return; }
  const snap=undoStack.pop();
  pieces=snap.map(r=>({id:idSeq++,shape:r.shape,ci:r.ci,x:r.x,y:r.y,rot:r.rot,gid:r.gid,anim:null,floating:false}));
  if(blend) for(const p of pieces) p.gid=gidSeq++;
  pushedAt.clear();
  saveState(); dirty=true;
}

let drag=null;
let press=null;
let trayPan=null;

function topPieceAt(x,y){
  for(let i=pieces.length-1;i>=0;i--){
    const p=pieces[i];
    const b=worldBBox(p);
    if(x<b[0]||x>b[2]||y<b[1]||y>b[3]) continue;
    if(pointInPoly(x,y,worldPts(p))) return p;
  }
  return null;
}
function bringGroupToTop(gid){
  const g=[], rest=[];
  for(const p of pieces) (p.gid===gid?g:rest).push(p);
  pieces=rest.concat(g);
}
function trayVisible(){ return mode==='free'; }
function recallY(){ return trayVisible() ? trayTop : H-DEL_H; }

function arcCenter(feat,p){ return xformPts([[feat.x,feat.y]],p)[0]; }
function findArcSnap(dragList){
  const ids=new Set(dragList.map(p=>p.id));
  let best=null;
  for(const dp of dragList){
    const ds=SHAPES[dp.shape];
    if(!ds.arcPlug && !ds.arcSocket) continue;
    for(const op of pieces){
      if(ids.has(op.id)) continue;
      const os=SHAPES[op.shape];
      let a=null,b=null;
      if(ds.arcPlug && os.arcSocket && os.arcSocket.r>=ds.arcPlug.r){
        a=arcCenter(ds.arcPlug,dp); b=arcCenter(os.arcSocket,op);
      }else if(ds.arcSocket && os.arcPlug && ds.arcSocket.r>=os.arcPlug.r){
        a=arcCenter(ds.arcSocket,dp); b=arcCenter(os.arcPlug,op);
      }else continue;
      const dx=b[0]-a[0], dy=b[1]-a[1];
      const d=Math.hypot(dx,dy);
      if(d<=SNAP_ARC && (!best || d<best.d)) best={dx,dy,d};
    }
  }
  return best;
}

function startDrag(gid,px,py){
  bringGroupToTop(gid);
  const list=groupPieces(gid);
  drag={
    gid, list,
    base:list.map(p=>[p.x,p.y]),
    sx:px, sy:py,
    snap:null, overTray:false,
    armRecall: py < recallY()-2,
    pointerId:press?press.pointerId:null
  };
}
function applyDrag(px,py){
  const dxAll=px-drag.sx, dyAll=py-drag.sy;
  for(let i=0; i<drag.list.length; i++){
    drag.list[i].x=drag.base[i][0]+dxAll;
    drag.list[i].y=drag.base[i][1]+dyAll;
  }
  const ry=recallY();
  if(py<ry-12) drag.armRecall=true;
  
  drag.overTray = (drag.armRecall && py>ry) || (py < 35);
  
  if(!drag.overTray){
    drag.snap=null;
    const currentSkin = SKINS[skinKey];
    const skipPhysics = blend || currentSkin.isVoid;
    
    if(!skipPhysics){
      const s1=findEdgeSnap(drag.list);
      if(s1){
        moveGroup(drag.list,s1.dx,s1.dy);
        drag.snap=s1;
        const s2=findEdgeSnap(drag.list,0.5);
        if(s2){
          const d=s2.dx*s1.tx+s2.dy*s1.ty;
          if(Math.abs(d)>0.01 && Math.abs(d)<=SNAP_PERP+SNAP_END)
            moveGroup(drag.list,s1.tx*d,s1.ty*d);
        }
      }else{
        const a1=findArcSnap(drag.list);
        if(a1){ moveGroup(drag.list,a1.dx,a1.dy); drag.snap=a1; }
      }
    }
    clampGroup(drag.list);
    if(!skipPhysics) resolveCollisions(drag.gid);
  }
  dirty=true;
}
function endDrag(){
  const d=drag; drag=null;
  if(d.overTray){
    const ids=new Set(d.list.map(p=>p.id));
    pieces=pieces.filter(p=>!ids.has(p.id));
    saveState(); dirty=true;
    return;
  }
  
  const currentSkin = SKINS[skinKey];
  const skipPhysics = blend || currentSkin.isVoid;

  if(skipPhysics){
    const tb=performance.now();
    for(const p of d.list){ p.floating=false; p.anim={type:'drop',t0:tb}; }
    pushedAt.clear();
    saveState(); dirty=true;
    return;
  }
  const now=performance.now();
  const notPushed=gid=>!(pushedAt.has(gid)&&now-pushedAt.get(gid)<PUSH_RECENT);
  const dragSet=new Set(d.list.map(p=>p.id));

  if(!d.snap){
    let bestPull=null;
    for(const dp of d.list){
      const db=worldBBox(dp);
      for(const op of pieces){
        if(dragSet.has(op.id)) continue;
        if(!notPushed(op.gid)) continue;
        if(!bboxOverlap(db,worldBBox(op),PULL_GAP+2)) continue;
        const gi=pieceGap(dp,op);
        if(gi.gap>0 && gi.gap<=PULL_GAP){
          if(!bestPull || gi.gap<bestPull.gap) bestPull=gi;
        }
      }
    }
    if(bestPull){
      moveGroup(d.list, bestPull.axis[0]*bestPull.gap, bestPull.axis[1]*bestPull.gap);
      clampGroup(d.list);
      resolveCollisions(d.gid);
    }
  }
  for(const dp of d.list){
    for(const op of pieces){
      if(op.gid===dp.gid) continue;
      if(!notPushed(op.gid)) continue;
      if(adjacent(dp,op)) unionGroups(dp.gid,op.gid);
    }
  }
  const t0=performance.now();
  for(const p of d.list){ p.floating=false; p.anim={type:'drop',t0}; }
  pushedAt.clear();
  saveState(); dirty=true;
}

function spawnFromWell(well,px,py){
  pushUndo();
  const p={
    id:idSeq++, shape:well.shape,
    ci:colorSeq++,
    x:px, y:Math.min(py-46, trayTop-30),
    rot:0, gid:gidSeq++, anim:null, floating:false
  };
  pieces.push(p);
  hintAlpha=0;
  startDrag(p.gid,px,py);
  dirty=true;
}

let activePointer=null;

cv.addEventListener('pointerdown',ev=>{
  if(activePointer!==null) return;
  activePointer=ev.pointerId;
  cv.setPointerCapture(ev.pointerId);
  const x=ev.clientX, y=ev.clientY;
  if(y>trayTop){
    const wx=x-trayScroll;
    let hit=null;
    for(const w of wells){
      if(wx>=w.x&&wx<=w.x+w.w&&y>=w.y&&y<=w.y+w.h){ hit=w; break; }
    }
    if(!trayScrollable()){
      if(hit) spawnFromWell(hit,x,y);
      return;
    }
    trayPan={sx:x, sy:y, scroll0:trayScroll, well:hit, mode:null};
    return;
  }
  const p=topPieceAt(x,y);
  if(!p){ activePointer=null; return; }
  pushUndo();
  press={piece:p, sx:x, sy:y, pointerId:ev.pointerId, timer:null};
  press.timer=setTimeout(()=>{
    if(!press || press.piece!==p) return;
    const oldGid=p.gid;
    p.gid=gidSeq++;
    p.floating=true;
    splitGroup(oldGid);
    startDrag(p.gid, press.sx, press.sy);
    press=null;
    dirty=true;
  },LONGPRESS_MS);
});

cv.addEventListener('pointermove',ev=>{
  if(ev.pointerId!==activePointer) return;
  const x=ev.clientX, y=ev.clientY;
  if(trayPan){
    if (drag) return; 
    const dx=x-trayPan.sx, dy=y-trayPan.sy;
    if(!trayPan.mode){
      if(Math.abs(dx)>SLOP && Math.abs(dx)>=Math.abs(dy)){
        trayPan.mode='scroll';
      }else if(trayPan.well && dy<-SLOP){
        const w=trayPan.well, sx=trayPan.sx, sy=trayPan.sy;
        trayPan=null;
        spawnFromWell(w,sx,sy);
        applyDrag(x,y);
        return;
      }else if(!trayPan.well && Math.hypot(dx,dy)>SLOP){
        trayPan.mode='scroll';
      }
    }
    if(trayPan && trayPan.mode==='scroll'){
      trayScroll=Math.max(trayScrollMin, Math.min(0, trayPan.scroll0+dx));
      dirty=true;
    }
    return;
  }
  if(press){
    if(Math.hypot(x-press.sx,y-press.sy)>SLOP){
      clearTimeout(press.timer);
      const gid=press.piece.gid;
      const sx=press.sx, sy=press.sy;
      press=null;
      startDrag(gid,sx,sy);
      applyDrag(x,y);
    }
    return;
  }
  if(drag) applyDrag(x,y);
});

function rotateGroup(piece){
  const list=groupPieces(piece.gid);
  const gb=groupBBox(list);
  const cx=(gb[0]+gb[2])/2, cy=(gb[1]+gb[3])/2;
  const c = Math.SQRT1_2, s = Math.SQRT1_2; 
  const t0=performance.now();
  for(const p of list){
    p.anim={type:'spin', t0, fx:p.x, fy:p.y, fr:p.rot};
    const dx=p.x-cx, dy=p.y-cy;
    p.x=cx+dx*c-dy*s;
    p.y=cy+dx*s+dy*c;
    p.rot+=Math.PI/4;
  }
  bringGroupToTop(piece.gid);
  clampGroup(list);
  
  const currentSkin = SKINS[skinKey];
  const skipPhysics = blend || currentSkin.isVoid;
  if(!skipPhysics) resolveCollisions(piece.gid);
  
  pushedAt.clear();
  saveState(); dirty=true;
}
cv.addEventListener('pointerup',ev=>{
  if(ev.pointerId!==activePointer) return;
  activePointer=null;
  if(trayPan){
    const tp=trayPan; trayPan=null;
    if(!tp.mode && tp.well){ spawnFromWell(tp.well,tp.sx,tp.sy); endDrag(); }
    return;
  }
  if(press){
    clearTimeout(press.timer);
    const p=press.piece; press=null;
    rotateGroup(p);
    return;
  }
  if(drag) endDrag();
});

function cancelInteraction(){
  if(press){ clearTimeout(press.timer); press=null; }
  trayPan=null;
  if(drag){
    clampGroup(drag.list);
    for(const p of drag.list) p.floating=false;
    drag=null;
    saveState();
  }
  activePointer=null;
  dirty=true;
}
cv.addEventListener('pointercancel', cancelInteraction);
window.addEventListener('blur', cancelInteraction);

const bgPatterns={};
function bgPattern(key){
  if(bgPatterns[key]!==undefined) return bgPatterns[key];
  let pat=null;
  const t=document.createElement('canvas');
  const tc=t.getContext('2d');
  if(key==='paper' || key==='lightGray' || key==='wood' || key==='grayBlue'){
    pat=grain;
  }else if(key==='paperHeavy'){
    pat=grainHeavy;
  }else if(key==='grid'){
    t.width=t.height=39;
    tc.strokeStyle='rgba(107,95,78,0.14)';
    tc.lineWidth=1;
    tc.beginPath();
    tc.moveTo(0.5,0); tc.lineTo(0.5,39);
    tc.moveTo(0,0.5); tc.lineTo(39,0.5);
    tc.stroke();
    pat=ctx.createPattern(t,'repeat');
  }else if(key==='darkTech'){
    pat=grain;
  }
  bgPatterns[key]=pat;
  return pat;
}
function paintBG(c,w,h){
  c.fillStyle=BGS[bgKey].base;
  c.fillRect(0,0,w,h);
  const pat=bgPattern(bgKey);
  if(pat){ c.fillStyle=pat; c.fillRect(0,0,w,h); }
}
function tracePath(c,s){
  if(s.trace){ s.trace(c); return; }
  const pts=s.pts, n=pts.length;
  if(s.organic){
    c.moveTo((pts[0][0]+pts[1][0])/2,(pts[0][1]+pts[1][1])/2);
    for(let i=1;i<=n;i++){
      const a=pts[i%n], b=pts[(i+1)%n];
      c.quadraticCurveTo(a[0],a[1],(a[0]+b[0])/2,(a[1]+b[1])/2);
    }
  }else{
    c.moveTo(pts[0][0],pts[0][1]);
    for(let i=1;i<n;i++) c.lineTo(pts[i][0],pts[i][1]);
  }
  c.closePath();
}
function piecePath(c,shape,x,y,rot,sx,sy){
  c.save();
  c.translate(x,y);
  if(sx !== undefined && sy !== undefined) c.scale(sx,sy);
  if(rot) c.rotate(rot);
  c.beginPath();
  tracePath(c,SHAPES[shape]);
  c.restore();
}

function drawTechPiece(c, p, px, py, rot, sx, sy) {
  c.save();
  c.translate(px, py);
  if (rot) c.rotate(rot);
  c.scale(sx, sy);

  c.beginPath();
  tracePath(c, SHAPES[p.shape]);
  c.save();
  c.clip();

  const bbox = SHAPES[p.shape].bbox;
  
  const grad = c.createLinearGradient(bbox[0], bbox[1], bbox[2], bbox[3]);
  const sidx = p.ci % 4;
  if (sidx === 0) {
    grad.addColorStop(0, '#111115'); 
    grad.addColorStop(0.5, '#402a1c');
    grad.addColorStop(1, '#f2a93b'); 
  } else if (sidx === 1) {
    grad.addColorStop(0, '#e85a30'); 
    grad.addColorStop(0.6, '#281c1c');
    grad.addColorStop(1, '#111115'); 
  } else if (sidx === 2) {
    grad.addColorStop(0, '#111115');
    grad.addColorStop(0.4, '#e85a30');
    grad.addColorStop(1, '#ffdd6b'); 
  } else {
    grad.addColorStop(0, '#402a1c');
    grad.addColorStop(1, '#111115');
  }
  
  c.fillStyle = grad;
  c.fillRect(bbox[0] - 10, bbox[1] - 10, bbox[2] - bbox[0] + 20, bbox[3] - bbox[1] + 20);

  c.globalCompositeOperation = 'overlay';
  c.fillStyle = fineNoise;
  c.fillRect(bbox[0] - 10, bbox[1] - 10, bbox[2] - bbox[0] + 20, bbox[3] - bbox[1] + 20);

  c.restore(); 
  c.restore();
}

function isVeryLightColor(hex) {
  if (!hex) return false;
  if (hex === '#ffffff' || hex === '#faf8f5') return true;
  if (hex.startsWith('rgba')) {
    const parts = hex.match(/[\d\.]+/g);
    if (parts && parts.length >= 3) {
      const r = parseFloat(parts[0]), g = parseFloat(parts[1]), b = parseFloat(parts[2]);
      return (r > 230 && g > 230 && b > 230);
    }
  }
  return false;
}

function drawPiece(c,p,now){
  let sx=1, sy=1, lift=0;
  let px=p.x, py=p.y, rot=p.rot||0;
  if(p.anim){
    const t=(now-p.anim.t0)/160;
    if(t>=1){ p.anim=null; }
    else if(p.anim.type==='drop'){
      const k=Math.sin(Math.PI*t)*(1-t);
      sx=1+0.05*k; sy=1-0.07*k;
    }else if(p.anim.type==='spin'){
      const back=Math.pow(1-t,3);
      px=p.x+(p.anim.fx-p.x)*back;
      py=p.y+(p.anim.fy-p.y)*back;
      rot=p.rot+(p.anim.fr-p.rot)*back;
    }
  }
  const skin=SKINS[skinKey];
  let col=skin.palette[p.ci % skin.palette.length];
  
  c.save();
  
  if (skin.isGlassineEmboss) {
    col = BGS[bgKey].base; 
  }

  if(blend && !skin.isWhiteGrad && !skin.isGlassineEmboss){
    if(isVeryLightColor(col)){
      c.globalCompositeOperation='source-over';
    }else{
      c.globalAlpha*=skin.blend.alpha||0.6;
      c.globalCompositeOperation=skin.blend.mode||'multiply';
    }
  }else if(p.floating){
    lift=5; sx*=1.07; sy*=1.07;
    if(skin.shadow){
      c.shadowColor='rgba(80,63,45,0.34)';
      c.shadowBlur=20; c.shadowOffsetY=12;
    }
  }else if(skin.shadow){
    c.shadowColor='rgba(88,70,52,0.26)';
    c.shadowBlur=7; c.shadowOffsetY=3;
  }
  c.translate(0,-lift);
  
  if (skin.isTech) {
    drawTechPiece(c, p, px, py, rot, sx, sy);
  } else if (skin.isPop) {
    c.save();
    c.fillStyle = col;
    c.beginPath();
    const popPts = worldPopPts(p);
    c.moveTo(popPts[0][0], popPts[0][1]);
    for (let i = 1; i < popPts.length; i++) c.lineTo(popPts[i][0], popPts[i][1]);
    c.closePath();
    c.fill();
    c.restore();
  } else if (skin.isWhiteGrad) {
    c.save();
    c.translate(px, py);
    if (rot) c.rotate(rot);
    c.scale(sx, sy);
    c.beginPath();
    tracePath(c, SHAPES[p.shape]);
    c.save();
    c.clip();
    const bbox = SHAPES[p.shape].bbox;
    const grad = c.createLinearGradient(bbox[0], bbox[1], bbox[2], bbox[3]);
    grad.addColorStop(0, 'rgba(255,255,255,0.80)');
    grad.addColorStop(1, 'rgba(255,255,255,0.15)');
    c.fillStyle = grad;
    c.fillRect(bbox[0]-10, bbox[1]-10, bbox[2]-bbox[0]+20, bbox[3]-bbox[1]+20);
    c.restore();
    c.restore();
  } else if (!skin.isVoid && !skin.isGlassineEmboss) {
    piecePath(c,p.shape,px,py,rot,sx,sy);
    c.fillStyle=col;
    c.fill();
    
    if (skin.isHumanity) {
      c.save();
      c.globalCompositeOperation = 'source-atop';
      c.fillStyle = heavyFiber;
      const bbox = SHAPES[p.shape].bbox;
      c.translate(px, py);
      if (rot) c.rotate(rot);
      c.fillRect(bbox[0]-10, bbox[1]-10, bbox[2]-bbox[0]+20, bbox[3]-bbox[1]+20);
      c.restore();
    }
  }

  // 顯影浮雕[cite: 1]
  if (skin.isGlassineEmboss) {
    c.save();
    c.translate(px, py);
    if (rot) c.rotate(rot);
    c.scale(sx, sy);
    
    // 【修改點 2】：刪除所有陰影/高光浮雕（無 shadow 偏移、無多層 stroke），改用極簡純淨線條。
    // 基於背景色動態調整線條明暗，確保視覺清晰度。
    const useDarkStroke = (bgKey === 'paper' || bgKey === 'paperHeavy' || bgKey === 'grid' || bgKey === 'lightGray');
    c.strokeStyle = useDarkStroke ? 'rgba(107, 95, 78, 0.45)' : 'rgba(255, 255, 255, 0.55)';
    c.lineWidth = 1.6;
    c.beginPath();
    tracePath(c, SHAPES[p.shape]);
    c.stroke();
    
    c.restore();
  }
  
  c.shadowColor='transparent';
  c.filter = 'none';

  if((!blend || skin.keepStroke || skin.isWhiteGrad) && skin.strokeW){
    if(blend && skin.keepStroke){
      c.globalCompositeOperation='source-over';
      c.globalAlpha=1;
    }
    c.strokeStyle=skin.stroke;
    c.lineWidth=skin.strokeW;
    piecePath(c,p.shape,px,py,rot,sx,sy);
    c.stroke();
  }
  c.restore();
}

function drawWellIcon(c,well){
  const s=SHAPES[well.shape];
  const bw=s.bbox[2]-s.bbox[0], bh=s.bbox[3]-s.bbox[1];
  const k=Math.min((well.w-10)/bw,(well.h-16)/bh,0.55);
  const cx=well.x+well.w/2, cy=well.y+well.h/2;
  c.save();
  c.translate(cx,cy);
  c.scale(k,k);
  c.beginPath();
  tracePath(c,s);
  c.fillStyle='#b3a284';
  c.fill();
  c.restore();
}

function draw(){
  const now=performance.now();
  ctx.clearRect(0,0,W,H);
  
  const isVoidMode = (skinKey === 'void' && pieces.length > 0);
  
  if (isVoidMode) {
    const tempCanvas = document.createElement('canvas');
    tempCanvas.width = W * DPR;
    tempCanvas.height = H * DPR;
    const tempCtx = tempCanvas.getContext('2d');
    tempCtx.setTransform(DPR, 0, 0, DPR, 0, 0);
    
    for (const p of pieces) {
      tempCtx.save();
      // 使用 XOR 達成重疊區域扣除，背景穿透的效果[cite: 1]
      tempCtx.globalCompositeOperation = 'xor';
      
      let p_sx = 1, p_sy = 1;
      let px = p.x, py = p.y, rot = p.rot || 0;
      if (p.anim && p.anim.type === 'drop') {
        const t = (now - p.anim.t0) / 160;
        if (t < 1) {
          const k = Math.sin(Math.PI * t) * (1 - t);
          p_sx = 1 + 0.05 * k; p_sy = 1 - 0.07 * k;
        }
      }
      
      tempCtx.translate(px, py);
      if (rot) tempCtx.rotate(rot);
      tempCtx.scale(p_sx, p_sy);
      tempCtx.beginPath();
      tracePath(tempCtx, SHAPES[p.shape]);
      
      const bbox = SHAPES[p.shape].bbox;
      const grad = tempCtx.createLinearGradient(bbox[0], bbox[1], bbox[2], bbox[3]);
      const sidx = p.ci % 4;
      if (sidx === 0) {
        grad.addColorStop(0, '#ffffff'); // 白
        grad.addColorStop(1, '#e2e2e2'); // 淺灰
      } else if (sidx === 1) {
        grad.addColorStop(0, '#1c1c1c'); // 黑
        grad.addColorStop(1, '#4d4d4d'); // 深灰
      } else if (sidx === 2) {
        grad.addColorStop(0, '#d9d9d9'); // 淺中灰
        grad.addColorStop(1, '#f2f2f2'); // 極淺灰
      } else {
        grad.addColorStop(0, '#4d4d4d'); // 深灰
        grad.addColorStop(1, '#333333'); // 極深灰
      }
      
      tempCtx.fillStyle = grad;
      tempCtx.fill();

      // 【修改點 1 (方案 B)】：消隱模式加入隨機微弱噪點，透過 ID 進行偏移，防重疊時過於呆板僵硬
      tempCtx.globalCompositeOperation = 'source-atop';
      tempCtx.globalAlpha = 0.06; 
      const seedX = (p.id * 37) % 64;
      const seedY = (p.id * 17) % 64;
      tempCtx.translate(seedX - px, seedY - py); 
      tempCtx.fillStyle = fineNoise;
      tempCtx.fillRect(bbox[0]-10, bbox[1]-10, bbox[2]-bbox[0]+20, bbox[3]-bbox[1]+20);
      
      tempCtx.restore();
    }
    
    paintBG(ctx, W, H);
    ctx.drawImage(tempCanvas, 0, 0, W, H);
  } else {
    // 一般模式
    paintBG(ctx,W,H);
    
    if(hintAlpha>0 && pieces.length===0 && trayVisible()){
      ctx.fillStyle=`rgba(107,95,78,${0.4*hintAlpha})`;
      ctx.font='15px -apple-system, "PingFang TC", sans-serif';
      ctx.textAlign='center';
      ctx.fillText('從下方拿一塊黏土開始', W/2, trayTop/2);
      ctx.fillStyle=`rgba(107,95,78,${0.28*hintAlpha})`;
      ctx.font='13px -apple-system, "PingFang TC", sans-serif';
      ctx.fillText('點一下塊可旋轉', W/2, trayTop/2+24);
    }
    
    for(const p of pieces){
      if(drag && drag.overTray && p.gid===drag.gid) ctx.globalAlpha=0.35;
      drawPiece(ctx,p,now);
      ctx.globalAlpha=1;
    }
  }
  
  // 處理 顯影浮雕 的多層粉透疊合[cite: 1]
  const isGlassineEmboss = (skinKey === 'glassineEmboss' && pieces.length > 1);
  
  if((skinKey === 'whiteGrad' || isGlassineEmboss) && pieces.length > 1){
    ctx.save();
    for(let i=0; i<pieces.length; i++){
      const p = pieces[i];
      let p_sx = 1, p_sy = 1;
      if(p.anim && p.anim.type==='drop'){
        const t=(now-p.anim.t0)/160;
        if(t<1){
          const k=Math.sin(Math.PI*t)*(1-t);
          p_sx=1+0.05*k; p_sy=1-0.07*k;
        }
      }
      if(p.floating){ p_sx*=1.07; p_sy*=1.07; }
      const pb = worldBBox(p);
      
      for(let j=i+1; j<pieces.length; j++){
        const q = pieces[j];
        let q_sx = 1, q_sy = 1;
        if(q.anim && q.anim.type==='drop'){
          const t=(now-q.anim.t0)/160;
          if(t<1){
            const k=Math.sin(Math.PI*t)*(1-t);
            q_sx=1+0.05*k; q_sy=1-0.07*k;
          }
        }
        if(q.floating){ q_sx*=1.07; q_sy*=1.07; }
        const qb = worldBBox(q);
        
        if(bboxOverlap(pb, qb, 0)){
          ctx.save();
          
          ctx.beginPath();
          piecePath(ctx, p.shape, p.x, p.y, p.rot||0, p_sx, p_sy);
          ctx.clip();
          
          if(isGlassineEmboss) {
            ctx.beginPath();
            piecePath(ctx, q.shape, q.x, q.y, q.rot||0, q_sx, q_sy);
            const colQ = SKINS.glassineEmboss.palette[q.ci % SKINS.glassineEmboss.palette.length];
            ctx.fillStyle = colQ;
            ctx.globalAlpha = 0.5;
            ctx.globalCompositeOperation = 'multiply';
            ctx.fill();
            
            // 【修改點 2】：疊合交錯處，同步去除浮雕陰影，僅描繪平整纖細的極簡交界邊線
            ctx.save();
            ctx.translate(q.x, q.y);
            if (q.rot) ctx.rotate(q.rot);
            ctx.scale(q_sx, q_sy);
            const useDarkStroke = (bgKey === 'paper' || bgKey === 'paperHeavy' || bgKey === 'grid' || bgKey === 'lightGray');
            ctx.strokeStyle = useDarkStroke ? 'rgba(107, 95, 78, 0.45)' : 'rgba(255, 255, 255, 0.55)';
            ctx.lineWidth = 1.4;
            ctx.beginPath();
            tracePath(ctx, SHAPES[q.shape]);
            ctx.stroke();
            ctx.restore();
          } else {
            ctx.translate(q.x, q.y);
            if (q.rot) ctx.rotate(q.rot);
            ctx.scale(q_sx, q_sy);
            ctx.beginPath();
            tracePath(ctx, SHAPES[q.shape]);
            
            const bboxQ = SHAPES[q.shape].bbox;
            const gradQ = ctx.createLinearGradient(bboxQ[0], bboxQ[1], bboxQ[2], bboxQ[3]);
            gradQ.addColorStop(0, 'rgba(255,255,255,0.70)');
            gradQ.addColorStop(1, 'rgba(255,255,255,0.15)');
            ctx.fillStyle = gradQ;
            ctx.globalAlpha = 0.8;
            ctx.globalCompositeOperation = 'source-over';
            ctx.fill();
          }
          ctx.restore();
        }
      }
    }
    ctx.restore();
  }

  if(trayVisible()){
    ctx.save();
    ctx.shadowColor='rgba(90,72,50,0.12)';
    ctx.shadowBlur=10; ctx.shadowOffsetY=-2;
    ctx.fillStyle=TRAY_BG;
    ctx.fillRect(0,trayTop,W,TRAY_H);
    ctx.restore();
    ctx.fillStyle=grain; ctx.fillRect(0,trayTop,W,TRAY_H);
    if(drag && drag.overTray){
      ctx.fillStyle='rgba(190,140,110,0.16)';
      ctx.fillRect(0,trayTop,W,TRAY_H);
      ctx.fillStyle='rgba(107,95,78,0.6)';
      ctx.font='13px -apple-system, "PingFang TC", sans-serif';
      ctx.textAlign='center';
      ctx.fillText('放開收回', W/2, trayTop+16);
    }
    ctx.save();
    ctx.translate(trayScroll,0);
    for(const w of wells) drawWellIcon(ctx,w);
    ctx.restore();
    if(trayScrollable()){
      const avail=W-20, total=avail-trayScrollMin;
      const thumbW=avail*avail/total;
      const tx=10 + (-trayScroll)/(-trayScrollMin)*(avail-thumbW);
      ctx.fillStyle='rgba(107,95,78,0.25)';
      ctx.fillRect(tx, trayTop+TRAY_H-6, thumbW, 3);
    }
  }else if(drag && drag.armRecall){
    ctx.fillStyle = drag.overTray ? 'rgba(201,133,111,0.30)' : 'rgba(201,133,111,0.12)';
    ctx.fillRect(0,H-DEL_H,W,DEL_H);
    ctx.fillStyle='rgba(120,70,55,0.65)';
    ctx.font='13px -apple-system, "PingFang TC", sans-serif';
    ctx.textAlign='center';
    ctx.fillText('放開刪除', W/2, H-DEL_H/2+4);
  }

  if(drag && drag.overTray && drag.sy < 35){
    ctx.save();
    ctx.fillStyle='rgba(201,133,111,0.35)';
    ctx.fillRect(0,0,W,35);
    ctx.fillStyle='rgba(120,70,55,0.85)';
    ctx.font='13px -apple-system, "PingFang TC", sans-serif';
    ctx.textAlign='center';
    ctx.fillText('放開收回積木', W/2, 22);
    ctx.restore();
  }
}
function frame(){
  const animating = pieces.some(p=>p.anim) || !!drag;
  if(dirty || animating){ draw(); dirty=false; }
  requestAnimationFrame(frame);
}

function scatterDrop() {
  const n=5+Math.floor(Math.random()*3);
  const keys=TRAY_ORDER;
  const t0=performance.now();
  for(let i=0;i<n;i++){
    pieces.push({
      id:idSeq++, shape:keys[Math.floor(Math.random()*keys.length)],
      ci:colorSeq++,
      x:80+Math.random()*Math.max(1,W-160),
      y:90+Math.random()*Math.max(1,H-200),
      rot:Math.floor(Math.random()*8)*(Math.PI/4),
      gid:gidSeq++, anim:{type:'drop',t0}, floating:false
    });
  }
  
  const currentSkin = SKINS[skinKey];
  const skipPhysics = blend || currentSkin.isVoid;
  if(!skipPhysics) {
    for(let i=0;i<6;i++) resolveCollisions(-1);
  }
  
  for(const g of new Set(pieces.map(p=>p.gid))) clampGroup(groupPieces(g));
  hintAlpha=0;
  saveState(); 
}
function refillDrop(){
  pushUndo();
  const n=3+Math.floor(Math.random()*3);
  const t0=performance.now();
  
  const currentSkin = SKINS[skinKey];
  const skipPhysics = blend || currentSkin.isVoid;

  for(let i=0;i<n;i++){
    const shape=TRAY_ORDER[Math.floor(Math.random()*TRAY_ORDER.length)];
    const rot=Math.floor(Math.random()*8)*(Math.PI/4);
    let best=null;
    for(let k=0;k<40;k++){
      const x=80+Math.random()*Math.max(1,W-160);
      const y=90+Math.random()*Math.max(1,H-200);
      const b=worldBBox({shape,x,y,rot});
      let ov=0;
      for(const q of pieces){
        const qb=worldBBox(q);
        const w=Math.min(b[2],qb[2])-Math.max(b[0],qb[0])+8;
        const h=Math.min(b[3],qb[3])-Math.max(b[1],qb[1])+8;
        if(w>0&&h>0) ov+=w*h;
      }
      if(!best||ov<best.ov) best={x,y,ov};
      if(ov===0) break;
    }
    const p={id:idSeq++,shape,ci:colorSeq++,x:best.x,y:best.y,rot,gid:gidSeq++,anim:{type:'drop',t0},floating:false};
    pieces.push(p);
    
    if(!skipPhysics){
      for(let it=0;it<6;it++){
        let moved=false;
        for(const q of pieces){
          if(q===p) continue;
          if(!bboxOverlap(worldBBox(p),worldBBox(q),1)) continue;
          for(const pa of worldParts(p)) for(const qb of worldParts(q)){
            const m=mtv(qb,pa);
            if(m){ p.x+=m[0]; p.y+=m[1]; moved=true; }
          }
        }
        clampGroup([p]);
        if(!moved) break;
      }
    }
  }
  hintAlpha=0;
  saveState(); dirty=true;
}

function changeSkin(step){
  skinKey=SKIN_ORDER[(SKIN_ORDER.indexOf(skinKey)+step+SKIN_ORDER.length)%SKIN_ORDER.length];
  
  const currentSkin = SKINS[skinKey];
  blend=!!(currentSkin.blend && currentSkin.blend.mode==='multiply');
  
  if (skinKey === 'tech') {
    if (bgKey !== 'darkTech') bgAutoDark = true;
    bgKey = 'darkTech';
  } else if (bgKey === 'darkTech' && bgAutoDark) {
    bgKey = 'paper';
    bgAutoDark = false;
  }

  if(blend || currentSkin.isVoid || currentSkin.isGlassineEmboss){
    for(const p of pieces) p.gid=gidSeq++;
  }
  updateBtns(); saveState(); dirty=true;
}
skinPrevBtn.addEventListener('click',()=>changeSkin(-1));
skinNextBtn.addEventListener('click',()=>changeSkin(1));
bgBtn.addEventListener('click',()=>{
  bgKey=BG_ORDER[(BG_ORDER.indexOf(bgKey)+1)%BG_ORDER.length];
  bgAutoDark=false;
  updateBtns(); saveState(); dirty=true;
});

function saveState(){
  try{
    localStorage.setItem('plop-state',JSON.stringify({
      mode, blend, skin:skinKey, bg:bgKey, bgAutoDark, colorSeq,
      pieces:pieces.map(p=>({s:p.shape,ci:p.ci%12,x:Math.round(p.x*10)/10,y:Math.round(p.y*10)/10,g:p.gid,
                             r:((Math.round((p.rot||0)/(Math.PI/4))%8)+8)%8}))
    }));
  }catch(e){}
}
function loadState(){
  try{
    const raw=localStorage.getItem('plop-state');
    if(!raw) return;
    const st=JSON.parse(raw);
    if(st.mode==='free'||st.mode==='rand') mode=st.mode;
    
    if(SKINS[st.skin]) {
      skinKey=st.skin;
    } else {
      skinKey='mineral';
    }
    
    const currentSkin = SKINS[skinKey];
    blend = !!(currentSkin.blend && currentSkin.blend.mode==='multiply');
    if(BGS[st.bg]) bgKey=st.bg;
    bgAutoDark=!!st.bgAutoDark;
    colorSeq=st.colorSeq||0;
    if(Array.isArray(st.pieces)){
      const gmap=new Map();
      let i=0;
      for(const r of st.pieces){
        if(!SHAPES[r.s]) continue;
        if(!gmap.has(r.g)) gmap.set(r.g,gidSeq++);
        pieces.push({id:idSeq++,shape:r.s,ci:r.ci,x:r.x,y:r.y,rot:(r.r||0)*(Math.PI/4),gid:gmap.get(r.g),anim:null,floating:false});
        i++;
      }
      if(pieces.length) hintAlpha=0;
    }
  }catch(e){}
}

function resize(){
  DPR=Math.min(window.devicePixelRatio||1,2);
  W=window.innerWidth; H=window.innerHeight;
  trayTop = trayVisible() ? H-TRAY_H : H;
  cv.width=W*DPR; cv.height=H*DPR;
  cv.style.width=W+'px'; cv.style.height=H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  layoutWells();
  const gids=[...new Set(pieces.map(p=>p.gid))];
  for(const g of gids) clampGroup(groupPieces(g));
  dirty=true;
}
window.addEventListener('resize',resize);
document.addEventListener('gesturestart',e=>e.preventDefault());

window.addEventListener('load', () => {
  requestAnimationFrame(() => {
    makeGrain();
    loadState();
    updateBtns();
    resize();
    if(mode==='rand' && pieces.length===0){ scatterDrop(); saveState(); }
    
    requestAnimationFrame(frame);
    
    setTimeout(() => {
      const loader = document.getElementById('loader');
      if (loader) loader.classList.add('hide');
    }, 200);
  });
});
</script>
</body>
</html>
